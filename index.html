<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>'시각디자이너' 송정음입니다</title>

</head>

<body>
  <header>
    <img = class="mainimg" src="image/시각.webp" alt="">
    <h1>'시각디자인'을 정의합니다</h1>
  </header>
    
  <article> 
    <div class="profile-wrap">
    <img src="image/it's me.jpeg" class="profile-img" alt="Profile Image">
    </div>
  </article> 
  
  <div> 
    <ul> 
        <li class="who"><a id="whoBtn" href="image/who.jpeg">who am I</a></li>
        <li class="text" id="whoText">
        한국폴리텍대학교 시각디자인학과<br>
        <b>송정음</b>입니다.<br></li>
       
        <li class="what"><a id="whatBtn" href="image/pick me.jpeg">what design means to me</a></li>
          <!-- what makes you move? -->
        <li class="text" id="whatText">
        '시각디자인'은 저에게 텍스트만으로는 전할 수 없는 것들 을 전할 수 있게 해주는 또 다른 언어입니다.<br></li>
    
        <li class="How"><a id="HowBtn" href="image/pick me.jpeg">Next step</a></li>
          <!-- what makes you move? -->
        <li class="text" id="HowText">
            앞으로</li>
    </ul>
  </div>

  

  <aside> 
    <div class="countdown">
    <div class="box">
      <span id="days">0</span>
      <span>일</span>
    </div>
    <div class="box">
      <span id="hours">00</span>
      <span>시간</span>
    </div>
    <div class="box">
      <span id="minutes">00</span>
      <span>분</span>
    </div>
    <div class="box">
      <span id="seconds">00</span>
      <span>초</span>
    </div>
  </div>
  </aside>

  

  <script src="main.js"></script> 
  </div>
</body>

</html>
